# In _config.yml
title: NghiaHoang
author: NghiaHoang
logo: images/0cb875e5fae5d1074bc66270c7d519e6--bunny.jpg
execute:
  execute_notebooks: 'off'

exclude_patterns:
  - '.agents/*'
  - '**/AGENTS.md'
  - '**/math_topics.md'
  - '_build/*'
  - 'book/book.pdf'

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

repository:
  url: https://github.com/kenakai16/kenakai16.github.io
  path_to_book: ""
  branch: main

html:
  use_issues_button: false
  use_repository_button: true
  extra_navbar: ""
  extra_footer: ""
  home_page_in_toc: true
  use_multitoc_numbering: false
  use_download_button: true